# Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ipr
spring.datasource.username=Anik
spring.datasource.password=123456

# Dev server port
server.port=8081

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari Connection Pool (smaller for local dev)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JWT Security Variables
jwt.secret=nic_iprms_unified_secret_key_1234567890123456
jwt.expiration=36000000
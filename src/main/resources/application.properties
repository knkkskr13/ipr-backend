# Default profile (can be overridden by env variable SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

# Common settings (apply to all profiles unless overridden)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging (default level, can override per profile)
logging.level.root=INFO

# Error handling (base setting, override in profiles if needed)
spring.web.error.include-message=always

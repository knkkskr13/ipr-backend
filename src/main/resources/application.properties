# Default profile (can be overridden by env variable SPRING_PROFILES_ACTIVE) while deploying or on local machine
spring.profiles.active=dev

# Common settings (apply to all profiles unless overridden)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging (default level, can override per profile)
logging.level.root=INFO

# Error handling (base setting, override in profiles if needed)
spring.web.error.include-message=always

# JWT Configuration (Mapped to Environment Variables for Production)
# We provide defaults so Spring doesn't crash if env vars are missing
jwt.secret=${JWT_SECRET:ipr-management-system-secret-key-2026-secure}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
